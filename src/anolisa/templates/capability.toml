# Template: capability manifest v2.
# Copy to src/anolisa/manifests/capabilities/<capability>.toml.

manifest_version = 2
anolisa_min_version = "0.1.0"

[capability]
name = "agent-observability"
description = "Agent behavior tracing and token attribution"
domain = "observability"
stability = "experimental" # stable | experimental | hidden

[implementation]
components = ["agentsight"]

[implementation.features]
agentsight = ["token_counting", "ebpf_tracing"]

[requires_env]
os = "linux"
arch = ["x86_64", "aarch64"]

[[backends]]
name = "default"
component = "agentsight"
default = true
requires_env = { btf_available = "true" }

[[health_checks]]
name = "capability-status"
kind = "component"
component = "agentsight"

[output]
status_label = "Agent observability"
summary = "AgentSight tracing and metering"
