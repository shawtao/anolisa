# Concrete artifact URL / checksum / signature / backend live here, never in
# component manifests. One `[[entries]]` row per (component, version, channel,
# target) artifact binding. Consumed by
# `anolisa_core::distribution::DistributionIndex`.
#
# `artifact_type` values use snake_case (`rpm`, `deb`, `tar_gz`, `zip`, `oci`,
# `file`, `binary`). Legacy `tar.gz` / `tar` strings are still accepted by the
# loader but normalized to `tar_gz`; new templates should use `tar_gz`.
#
# IMPORTANT: This file is a TEMPLATE. Every value wrapped in
# `<REPLACE_WITH_...>` (and every `example.invalid` URL) is a placeholder
# meant to be substituted before the file is published as an actual
# distribution index. Do NOT copy this file verbatim into
# `manifests/distribution-index/index.toml` — the host `example.invalid`
# is reserved by RFC 2606 and will never resolve, so a copy-paste mistake
# will fail loudly instead of silently fetching the wrong artifact.

